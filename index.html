<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>台股自選股 AI 報告</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #d9cbb8;
      --card: #ffffff;
      --text: #1e1f27;
      --muted: #6b7280;
      --accent: #0d9488;
      --accent-2: #f59e0b;
      --accent-soft: #ccfbf1;
      --border: #e5e7eb;
      --shadow: 0 14px 38px rgba(15, 23, 42, 0.1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 28px 16px;
    }
    .container {
      width: min(1100px, 100%);
      margin: 0 auto;
    }
    .hero {
      background: linear-gradient(140deg, #635b41, #705322 60%, #62461e);
      color: #fff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 16px 44px rgba(8, 47, 73, 0.28);
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: "";
      position: absolute;
      right: -40px;
      top: -30px;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 36px);
      font-family: "Sora", "Noto Sans TC", sans-serif;
      letter-spacing: 0.4px;
    }
    .hero p { margin: 0; opacity: 0.95; }
    .meta {
      margin-top: 12px;
      font-size: 13px;
      opacity: 0.9;
    }
    .kpis {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .kpi {
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 14px;
      padding: 10px 12px;
      backdrop-filter: blur(2px);
    }
    .kpi .label {
      font-size: 12px;
      opacity: 0.85;
    }
    .kpi .value {
      margin-top: 4px;
      font-family: "Sora", "Noto Sans TC", sans-serif;
      font-size: 20px;
      font-weight: 700;
    }
    .dashboard {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .price-board {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .price-board h3 {
      margin: 0 0 10px;
      font-size: 16px;
      color: #0f172a;
    }
    .price-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .price-table th,
    .price-table td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid #e2e8f0;
      white-space: nowrap;
    }
    .price-table th {
      color: #475569;
      font-weight: 700;
      font-size: 13px;
    }
    .num { font-family: "Sora", "Noto Sans TC", sans-serif; }
    .up { color: #0f766e; font-weight: 700; }
    .down { color: #b91c1c; font-weight: 700; }
    .flat { color: #475569; font-weight: 700; }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      box-shadow: var(--shadow);
      min-height: 280px;
      animation: riseIn .5s ease;
    }
    .panel h3 {
      margin: 0 0 10px;
      font-size: 15px;
      color: #0f172a;
      letter-spacing: 0.2px;
    }
    .canvas-wrap {
      position: relative;
      height: 220px;
    }
    @keyframes riseIn {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .report {
      margin-top: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow);
      line-height: 1.8;
    }
    h1, h2, h3, h4 { line-height: 1.3; }
    h1 { font-size: 28px; }
    h2 {
      font-size: 22px;
      margin-top: 34px;
      margin-bottom: 12px;
      color: #0f766e;
      border-left: 6px solid #14b8a6;
      padding-left: 10px;
    }
    h3 { font-size: 19px; margin-top: 24px; margin-bottom: 10px; color: #0f172a; }
    h4 { font-size: 16px; margin-top: 16px; margin-bottom: 8px; }
    .report p { margin: 10px 0; }
    .report li { margin: 6px 0; }
    .report strong { color: #0f172a; }
    /* ── 個股分析圖表 ─────────────────────────── */
    .psc-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 10px 0 22px;
    }
    .psc-canvas-wrap canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
    @media (max-width: 1100px) {
      .psc-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) { .psc-grid { grid-template-columns: 1fr; } }
    .psc-card {
      background: #f8f7f4;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px 10px;
    }
    .psc-title {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .06em;
      color: #64748b;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .psc-canvas-wrap { position: relative; height: 175px; }
    .psc-meta {
      font-size: .68rem;
      color: #94a3b8;
      margin-top: 5px;
      text-align: center;
    }
    hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }
    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9em;
      word-break: break-word;
      overflow-wrap: break-word;
      display: inline-block;
      max-width: 100%;
    }
    .report pre {
      max-width: 100%;
      overflow-x: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      padding: 10px 12px;
      border-radius: 8px;
      background: #f3f4f6;
    }
    .report pre code {
      display: block;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      max-width: 100%;
      padding: 0;
      background: transparent;
    }
    ul, ol { padding-left: 1.2rem; }
    blockquote {
      margin: 0;
      padding: 10px 14px;
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 8px;
    }
    .tip {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .status {
      margin-top: 8px;
      color: #475569;
      font-size: 13px;
    }
    .status.warn { color: #b45309; }
    .status.ok { color: #0f766e; }
    .stock-manager {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin: 6px 0 12px;
    }
    .stock-manager-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .stock-manager input {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      min-width: 190px;
    }
    .sm-btn {
      border: 0;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }
    .sm-btn.add { background: #0d9488; color: #fff; }
    .sm-btn.remove { background: #e2e8f0; color: #1e293b; padding: 4px 8px; font-size: 12px; }
    .stock-tags {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .stock-tags li {
      margin: 0;
      background: #ffffff;
      border: 1px solid #dbe3ef;
      border-radius: 999px;
      padding: 4px 8px 4px 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      cursor: grab;
      user-select: none;
    }
    .stock-tags li.dragging {
      opacity: 0.55;
      transform: scale(0.98);
    }
    .stock-tags li.drag-over {
      border-color: #0d9488;
      box-shadow: 0 0 0 2px rgba(13, 148, 136, 0.2);
    }
    .stock-manager-hint {
      color: #64748b;
      font-size: 12px;
      margin: 0;
    }
    @media (max-width: 960px) {
      .dashboard { grid-template-columns: 1fr; }
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .panel { min-height: 250px; }
      .canvas-wrap { height: 190px; }
      body { padding: 14px 12px; }
      .hero { padding: 16px; }
      .hero h1 { font-size: clamp(20px, 3vw, 28px); }
      h3 { font-size: 16px; }
      h4 { font-size: 14px; }
      .psc-title { font-size: 0.65rem; }
      .psc-canvas-wrap { height: 140px; }
    }
    @media (max-width: 600px) {
      .kpis { grid-template-columns: 1fr; gap: 8px; }
      .kpi { padding: 8px 10px; }
      .kpi .value { font-size: 14px; }
      .price-board { padding: 10px; overflow-x: auto; }
      .report { padding: 10px; }
      h2 { font-size: 18px; }
      p { font-size: 14px; }
      li { font-size: 14px; }
      .stock-manager input { width: 100%; min-width: 0; }
      .stock-manager-row { display: grid; grid-template-columns: 1fr; }
      .sm-btn.add { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>台股自選股 AI 報告</h1>
      <div class="meta" id="metaUpdated">資料更新中...</div>
      <div class="kpis">
        <div class="kpi"><div class="label">追蹤檔數</div><div class="value" id="kpiCount">--</div></div>
        <div class="kpi"><div class="label">當日最強</div><div class="value" id="kpiLeader">--</div></div>
        <div class="kpi"><div class="label">平均漲跌幅</div><div class="value" id="kpiAvgMove">--</div></div>
        <div class="kpi"><div class="label">風險等級</div><div class="value" id="kpiRisk">--</div></div>
      </div>
    </section>

    <section class="dashboard" aria-label="報告圖表">
      <div class="panel">
        <h3>個股近 5 日收盤趨勢（真實資料）</h3>
        <div class="canvas-wrap"><canvas id="trendChart"></canvas></div>
      </div>
      <div class="panel">
        <h3>今日強弱雷達（技術/動能/量能）</h3>
        <div class="canvas-wrap"><canvas id="radarChart"></canvas></div>
      </div>
      <div class="panel">
        <h3>資金配置（今日成交金額占比）</h3>
        <div class="canvas-wrap"><canvas id="mixChart"></canvas></div>
      </div>
    </section>

    <section class="price-board" aria-label="目前價格">
      <h3>目前價格（當日收盤）</h3>
      <table class="price-table" id="priceTable">
        <thead>
          <tr>
            <th>股票</th>
            <th>代碼</th>
            <th>收盤價</th>
            <th>漲跌</th>
            <th>漲跌幅</th>
            <th>成交金額(億)</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="6">資料讀取中...</td></tr>
        </tbody>
      </table>
    </section>

    <article class="report" id="report"></article>
    <p class="tip" id="contentUpdatedAt">報告更新時間：讀取中...</p>
    <p class="tip" id="sourceNote">資料來源：TWSE 開放資料 API（收盤後更新）。</p>
    <p class="status" id="fetchStatus">資料準備中...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const defaultMarkdownText = `# 台股自選股追蹤報告

---

# 大盤走勢分析

（報告載入中，請稍候或執行一鍵更新後重新整理）

---

# 自選股清單

---

# 個股分析

---

# 自選股綜合評價

---

*資料來源：台灣證券交易所、雅虎財經、Google Gemini AI*
*本報告僅供參考，不構成任何投資建議。*
`;

    // 報告 API 位址：可用網址參數 reportApi 或 localStorage.reportApiUrl 設定
    const reportApiUrl = new URLSearchParams(window.location.search).get("reportApi")
      || localStorage.getItem("reportApiUrl")
      || "";

    // Gemini 金鑰：可用網址參數 geminiApiKey 或 localStorage.geminiApiKey 設定
    const geminiApiKey = new URLSearchParams(window.location.search).get("geminiApiKey")
      || localStorage.getItem("geminiApiKey")
      || "";

    // 追蹤股票清單（可依需求增減）
    const defaultTrackedStocks = [
      { code: "3037", name: "欣興" },
      { code: "4958", name: "臻鼎-KY" },
      { code: "3189", name: "景碩" },
      { code: "8046", name: "南電" }
    ];
    let trackedStocks = loadTrackedStocks();

    function loadTrackedStocks() {
      try {
        const raw = localStorage.getItem("trackedStocks");
        if (!raw) return [...defaultTrackedStocks];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed) || !parsed.length) return [...defaultTrackedStocks];
        const filtered = parsed
          .map((s) => ({ code: String(s.code || "").trim(), name: String(s.name || "").trim() }))
          .filter((s) => /^\d{4}$/.test(s.code));
        return filtered.length ? filtered : [...defaultTrackedStocks];
      } catch (e) {
        return [...defaultTrackedStocks];
      }
    }

    function persistTrackedStocks() {
      localStorage.setItem("trackedStocks", JSON.stringify(trackedStocks));
    }

    // 圖表字體設定
    const chartFont = {
      family: "Sora, Noto Sans TC, sans-serif",
      size: 11
    };

    // 全域圖表預設樣式
    Chart.defaults.color = "#334155";
    Chart.defaults.font = chartFont;

    // 三張圖表實例（先宣告，稍後建立）
    let trendChart;
    let radarChart;
    let mixChart;
    let liveStockSnapshots = [];
    let stockDayAllCache = null;

    // 將字串數字（含逗號、+號）轉成 Number
    function parseNumber(value) {
      if (value === null || value === undefined) return NaN;
      const cleaned = String(value).replace(/,/g, "").replace(/\+/g, "").trim();
      const n = Number(cleaned);
      return Number.isFinite(n) ? n : NaN;
    }

    // 限制數值範圍，避免圖表出現極端值
    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    // 格式化百分比（保留正負號）
    function formatPct(v) {
      return `${v >= 0 ? "+" : ""}${v.toFixed(2)}%`;
    }

    // 格式化時間顯示（繁中）
    function formatDateTime(dt) {
      return new Intl.DateTimeFormat("zh-TW", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(dt);
    }

    // 從多種 JSON 結構萃取 markdown 文字（含 Gemini/n8n 常見格式）
    function extractMarkdownFromPayload(payload) {
      if (typeof payload === "string") return payload;
      if (!payload || typeof payload !== "object") return "";

      const direct = payload.markdown || payload.report || payload.text;
      if (typeof direct === "string" && direct.trim()) return direct;

      if (payload.data && typeof payload.data === "object") {
        const nested = payload.data.markdown || payload.data.report || payload.data.text;
        if (typeof nested === "string" && nested.trim()) return nested;
      }

      // Gemini generateContent 原生回傳：candidates[0].content.parts[0].text
      const partsText = payload.candidates?.[0]?.content?.parts
        ?.map((p) => p && typeof p.text === "string" ? p.text : "")
        .filter(Boolean)
        .join("\n");
      if (partsText && partsText.trim()) return partsText;

      // n8n 有時會把結果包成陣列
      if (Array.isArray(payload) && payload.length) {
        for (const item of payload) {
          const value = extractMarkdownFromPayload(item);
          if (value) return value;
        }
      }

      return "";
    }

    // 讀取 Gemini 報告（支援純文字或 JSON）
    async function fetchLatestReportMarkdown() {
      // 1. 優先使用 reportApiUrl（若有設定）
      if (reportApiUrl) {
        const res = await fetch(reportApiUrl, { cache: "no-store" });
        if (!res.ok) throw new Error(`報告 API 錯誤：HTTP ${res.status}`);
        const contentType = (res.headers.get("content-type") || "").toLowerCase();
        if (contentType.includes("application/json")) {
          const json = await res.json();
          const markdown = extractMarkdownFromPayload(json);
          if (typeof markdown !== "string" || !markdown.trim()) throw new Error("報告 API JSON 解析不到文字內容");
          return markdown;
        }
        const text = await res.text();
        if (!text.trim()) throw new Error("報告 API 回傳空內容");
        return text;
      }

      // 2. 嘗試同目錄 report.md（GitHub Pages 上可用）
      try {
        const res = await fetch("./report.md", { cache: "no-store" });
        if (res.ok) {
          const text = await res.text();
          if (text.trim()) return text;
        }
      } catch (_e) { /* 本地以 file:// 開啟時 fetch 會失敗，略過 */ }

      throw new Error("找不到報告來源（report.md 不存在或尚未產生）");
    }

    // 從 Markdown 內文抓取自動填表時間（若有）
    function extractReportUpdatedAt(markdown) {
      if (typeof markdown !== "string") return "";
      const match = markdown.match(/自動填表時間：([^）\)\n]+)/);
      return match && match[1] ? match[1].trim() : "";
    }

    // 顯示報告更新時間
    function updateReportUpdatedAt(markdown) {
      const el = document.getElementById("contentUpdatedAt");
      const fromMarkdown = extractReportUpdatedAt(markdown);
      if (fromMarkdown) {
        el.textContent = `報告更新時間：${fromMarkdown}`;
      } else {
        el.textContent = `報告更新時間：${formatDateTime(new Date())}`;
      }
    }

    // 優先渲染 Gemini 最新報告，失敗才回退到預設文字
    async function renderLatestReport() {
      const reportEl = document.getElementById("report");
      try {
        const latestMarkdown = await fetchLatestReportMarkdown();
        reportEl.innerHTML = marked.parse(normalizeMarkdown(latestMarkdown));
        updateReportUpdatedAt(latestMarkdown);
      } catch (error) {
        reportEl.innerHTML = marked.parse(normalizeMarkdown(defaultMarkdownText));
        updateReportUpdatedAt(defaultMarkdownText);
        console.warn(`使用預設報告：${error.message}`);
      }
    }

    // 讀取 JSON：先直連，失敗再嘗試代理（CORS 備援）
    async function fetchJsonWithFallback(primaryUrl) {
      const candidates = [
        // 直連 TWSE
        { label: "direct", url: primaryUrl },
        // 代理 1
        { label: "allorigins", url: `https://api.allorigins.win/raw?url=${encodeURIComponent(primaryUrl)}` },
        // 代理 2
        { label: "corsproxy", url: `https://corsproxy.io/?${encodeURIComponent(primaryUrl)}` }
      ];

      let lastError = "";
      for (const candidate of candidates) {
        try {
          // 禁用快取，確保每次拿到最新資料
          const res = await fetch(candidate.url, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const json = await res.json();
          // 回傳資料與來源路徑（方便除錯）
          return { json, source: candidate.label };
        } catch (err) {
          // 紀錄最後一個失敗原因
          lastError = `${candidate.label}: ${err.message}`;
        }
      }

      throw new Error(`所有來源都失敗 (${lastError})`);
    }

    // 取得當日全市場資料
    async function fetchStockDayAll() {
      if (stockDayAllCache) return stockDayAllCache;
      const result = await fetchJsonWithFallback("https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL");
      if (!Array.isArray(result.json) || !result.json.length) {
        throw new Error("STOCK_DAY_ALL 回傳格式異常");
      }
      stockDayAllCache = result;
      return result;
    }

    // 取得單一股票近 5 日日資料
    async function fetchStockHistory(code) {
      const now = new Date();
      // date 參數用當月 01 日即可（TWSE 會回整月資料）
      const dateParam = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, "0")}01`;
      const url = `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${dateParam}&stockNo=${code}`;
      const result = await fetchJsonWithFallback(url);
      const json = result.json;
      if (json.stat !== "OK" || !Array.isArray(json.data) || !json.data.length) {
        throw new Error(`No history for ${code}`);
      }
      return {
        source: result.source,
        // 只保留近 5 筆，並挑出圖表需要欄位
        data: json.data.slice(-5).map((row) => ({
          date: String(row[0]).replace(/^\d+\//, ""),
          close: parseNumber(row[6]),
          change: parseNumber(row[7]),
          volume: parseNumber(row[1]),
          tradeValue: parseNumber(row[2])
        }))
      };
    }

    // 驗證歷史資料是否可繪圖
    function ensureHistoryRows(historyRows, code) {
      if (!Array.isArray(historyRows) || historyRows.length < 3) {
        throw new Error(`${code} 歷史資料不足`);
      }
      if (historyRows.some((x) => !Number.isFinite(x.close))) {
        throw new Error(`${code} 歷史收盤價格式錯誤`);
      }
      return historyRows;
    }

    // 組裝單一股票快照（當日 + 歷史）
    function buildStockSnapshot(stock, daily, historyRows) {
      const close = parseNumber(daily.ClosingPrice);
      const change = parseNumber(daily.Change);
      const prevClose = close - change;
      const changePct = prevClose ? (change / prevClose) * 100 : 0;
      const open = parseNumber(daily.OpeningPrice);
      const high = parseNumber(daily.HighestPrice);
      const low = parseNumber(daily.LowestPrice);

      if (!Number.isFinite(close) || !Number.isFinite(change)) {
        throw new Error(`${stock.code} 當日價格格式錯誤`);
      }

      return {
        ...stock,
        close,
        open,
        high,
        low,
        change,
        changePct,
        // 成交金額用於資金占比圖
        tradeValue: parseNumber(daily.TradeValue),
        history: ensureHistoryRows(historyRows, stock.code)
      };
    }

    // 在頁面上顯示目前資料來源路徑
    function updateSourceNote(daySource, historySources) {
      const uniq = Array.from(new Set([daySource, ...historySources]));
      const sourceText = uniq.join(" + ");
      document.getElementById("sourceNote").textContent = `資料來源：TWSE 開放資料 API（來源路徑：${sourceText}）。`;
    }

    // 顯示每檔股票目前價格（收盤）
    function renderPriceBoard(stocks) {
      const tbody = document.querySelector("#priceTable tbody");
      tbody.innerHTML = "";

      for (const s of stocks) {
        const cls = s.change > 0 ? "up" : (s.change < 0 ? "down" : "flat");
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${s.name}</td>
          <td class="num">${s.code}</td>
          <td class="num">${s.close.toFixed(2)}</td>
          <td class="num ${cls}">${s.change >= 0 ? "+" : ""}${s.change.toFixed(2)}</td>
          <td class="num ${cls}">${formatPct(s.changePct)}</td>
          <td class="num">${(s.tradeValue / 1e8).toFixed(2)}</td>
        `;
        tbody.appendChild(tr);
      }
    }

    // 更新狀態文字（例如：載入中）
    function loadingMessage(text) {
      const statusEl = document.getElementById("fetchStatus");
      statusEl.className = "status";
      statusEl.textContent = text;
    }

    // 建立三張圖表
    function createCharts(stocks, labels) {
      const palette = ["#0d9488", "#f59e0b", "#0ea5e9", "#a855f7"];
      if (trendChart) trendChart.destroy();
      if (radarChart) radarChart.destroy();
      if (mixChart) mixChart.destroy();
      // 趨勢折線圖資料集
      const trendDatasets = stocks.map((s, idx) => ({
        label: `${s.code} ${s.name}`,
        data: s.history.map((d) => d.close),
        borderColor: palette[idx % palette.length],
        backgroundColor: "transparent",
        tension: 0.35,
        pointRadius: 2.5
      }));

      trendChart = new Chart(document.getElementById("trendChart"), {
        type: "line",
        data: { labels, datasets: trendDatasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: "bottom" } },
          scales: {
            y: { grid: { color: "#e2e8f0" } },
            x: { grid: { display: false } }
          }
        }
      });

      const technical = clamp(50 + stocks.reduce((acc, s) => {
        const closes = s.history.map((h) => h.close);
        const ma5 = closes.reduce((a, b) => a + b, 0) / closes.length;
        // 以現價偏離五日均線估計技術強度
        return acc + ((s.close - ma5) / ma5) * 400;
      }, 0) / stocks.length, 5, 95);

      // 動能：用今日漲跌幅平均估算
      const momentum = clamp(50 + stocks.reduce((acc, s) => acc + s.changePct * 4, 0) / stocks.length, 5, 95);
      // 量能：以成交金額粗略映射到 0-100
      const liquidity = clamp(30 + stocks.reduce((acc, s) => acc + (s.tradeValue / 1e8), 0) / stocks.length, 5, 95);
      // 上漲家數占比
      const winRate = clamp((stocks.filter((s) => s.change > 0).length / stocks.length) * 100, 5, 95);

      const avg = stocks.reduce((a, s) => a + s.changePct, 0) / stocks.length;
      const variance = stocks.reduce((a, s) => a + Math.pow(s.changePct - avg, 2), 0) / stocks.length;
      // 波動越大，控制分數越低
      const volatilityControl = clamp(95 - Math.sqrt(variance) * 14, 5, 95);

      // 雷達圖
      radarChart = new Chart(document.getElementById("radarChart"), {
        type: "radar",
        data: {
          labels: ["技術面", "動能", "量能", "上漲家數", "波動可控"],
          datasets: [{
            label: "今日評分",
            data: [technical, momentum, liquidity, winRate, volatilityControl],
            backgroundColor: "rgba(14,116,144,0.22)",
            borderColor: "#0e7490",
            pointBackgroundColor: "#0e7490"
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            r: {
              suggestedMin: 0,
              suggestedMax: 100,
              angleLines: { color: "#cbd5e1" },
              grid: { color: "#e2e8f0" },
              pointLabels: { color: "#0f172a" }
            }
          }
        }
      });

      mixChart = new Chart(document.getElementById("mixChart"), {
        type: "doughnut",
        data: {
          labels: stocks.map((s) => `${s.code} ${s.name}`),
          datasets: [{
            data: stocks.map((s) => s.tradeValue),
            backgroundColor: ["#0d9488", "#0ea5e9", "#f59e0b", "#94a3b8"],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: "68%",
          plugins: { legend: { position: "bottom" } }
        }
      });
    }

    // 更新上方 KPI 卡片
    function renderKpis(stocks) {
      const avgMove = stocks.reduce((acc, s) => acc + s.changePct, 0) / stocks.length;
      const leader = [...stocks].sort((a, b) => b.changePct - a.changePct)[0];
      const volatility = Math.sqrt(stocks.reduce((acc, s) => acc + Math.pow(s.changePct - avgMove, 2), 0) / stocks.length);
      const risk = volatility >= 5 ? "高" : volatility >= 2.5 ? "中" : "低";

      document.getElementById("kpiCount").textContent = String(stocks.length);
      document.getElementById("kpiLeader").textContent = `${leader.code} ${formatPct(leader.changePct)}`;
      document.getElementById("kpiAvgMove").textContent = formatPct(avgMove);
      document.getElementById("kpiRisk").textContent = risk;
      document.getElementById("metaUpdated").textContent = `最後更新：${formatDateTime(new Date())}`;
    }

    // 主流程：讀資料 -> 組資料 -> 更新卡片與圖表
    async function bootstrapRealData() {
      const statusEl = document.getElementById("fetchStatus");
      try {
        if (!trackedStocks.length) {
          liveStockSnapshots = [];
          document.querySelector("#priceTable tbody").innerHTML = "<tr><td colspan=\"6\">尚無追蹤股票，請在自選股清單新增。</td></tr>";
          document.getElementById("kpiCount").textContent = "0";
          document.getElementById("kpiLeader").textContent = "--";
          document.getElementById("kpiAvgMove").textContent = "--";
          document.getElementById("kpiRisk").textContent = "--";
          statusEl.className = "status";
          statusEl.textContent = "目前沒有追蹤股票。";
          return [];
        }

        loadingMessage("正在讀取即時行情資料...");
        const dayAllResult = await fetchStockDayAll();
        const dayAll = dayAllResult.json;
        const byCode = new Map(dayAll.map((x) => [x.Code, x]));

        const stocks = [];
        const historySources = [];
        for (const stock of trackedStocks) {
          const daily = byCode.get(stock.code);
          if (!daily) continue;
          const historyResult = await fetchStockHistory(stock.code);
          historySources.push(historyResult.source);
          stocks.push(buildStockSnapshot(
            { code: stock.code, name: daily.Name || stock.name || stock.code },
            daily,
            historyResult.data
          ));
        }

        if (!stocks.length) {
          throw new Error("追蹤股票皆無可用資料");
        }

        const labels = stocks[0].history.map((x) => x.date);
        // 先更新 KPI，再建圖
        renderKpis(stocks);
        renderPriceBoard(stocks);
        createCharts(stocks, labels);
        updateSourceNote(dayAllResult.source, historySources);
        liveStockSnapshots = stocks;

        statusEl.className = "status ok";
        statusEl.textContent = "已載入 TWSE 真實資料，圖表與指標均為即時抓取結果。";
        return stocks;
      } catch (error) {
        statusEl.className = "status warn";
        statusEl.textContent = `讀取真實資料失敗：${error.message}。請確認網路或 API 可用性。`;
        document.getElementById("metaUpdated").textContent = "最後更新：資料讀取失敗";
        return [];
      }
    }

    // 將報告文字自動轉為分段標題，提升可讀性
    function normalizeMarkdown(raw) {
      let text = raw;

      // Add explicit section headings for better visual grouping.
      text = text
        .replace(/\n📋\s*今日偏好摘要\n/g, "\n## 📋 今日偏好摘要\n")
        .replace(/\n📊\s*區塊 A：/g, "\n## 📊 區塊 A：")
        .replace(/\n🚀\s*區塊 B：/g, "\n## 🚀 區塊 B：")
        .replace(/\n✉️\s*每日投資分析短文/g, "\n## ✉️ 每日投資分析短文")
        .replace(/\n【一鍵白話版】/g, "\n## 【一鍵白話版】")
        .replace(/\n【免責聲明】/g, "\n## 【免責聲明】");

      // Convert common label lines into bullet points under each section.
      text = text.replace(/\n(策略核心：|追蹤個股：|核心指標：|順序調整：|新聞呈現：|風控機制：)/g, "\n- $1");

      // Gemini sometimes outputs indented bullets (4+ spaces) that marked treats as code blocks.
      // Flatten those lines back to regular markdown list items to avoid wide gray code panels.
      text = text.replace(/^\s{4,}([*-]\s+\*\*[^\n]+)/gm, "$1");
      text = text.replace(/^\s{4,}([*-]\s+[^\n]+)/gm, "$1");

      // Improve sub-section readability for numbered stocks and report blocks.
      // Note: exclude lines that are chart headings (followed by a div on the next line)
      text = text.replace(/\n(\d+\.\s[^\n]+)/g, "\n### $1");
      text = text.replace(/\n(●\s[^\n]+)/g, "\n### $1");

      // Ensure enough blank lines between dense chunks.
      text = text.replace(/\n{3,}/g, "\n\n");

      return text;
    }

    // ── 個股分析迷你圖表 ─────────────────────────────────────
    const _pscCharts = {};   // track Chart.js instances for cleanup

    function _clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    function renderPerStockCharts() {
      document.querySelectorAll(".stock-chart-block").forEach(div => {
        const raw = div.getAttribute("data-stock");
        if (!raw) return;
        let s;
        try { s = JSON.parse(raw); } catch (e) { return; }

        const code = s.code || "??";
        const recentCloses  = s.recentCloses  || [];
        const recentVolumes = s.recentVolumes || [];
        const recentDates   = s.recentDates   || recentCloses.map((_, i) => `D${i + 1}`);
        const vol5avg  = s.vol5avg  || (recentVolumes.slice(-5).reduce((a, b) => a + b, 0) / Math.max(1, Math.min(5, recentVolumes.length)));
        const vol20avg = s.vol20avg || (recentVolumes.reduce((a, b) => a + b, 0) / Math.max(1, recentVolumes.length));
        const todayVol = s.volume || 0;

        // Compute radar scores
        const close  = s.close  || 0;
        const ma5    = s.ma5    || close;
        const ma20   = s.ma20   || close;
        const ma60   = s.ma60   || close;
        const high20 = s.high20 || close;
        const low20  = s.low20  || close;
        const changePct = s.changePct || 0;
        const volRatio  = s.volRatio  || 1;
        const techScore   = _clamp(50 + (close - ma20) / (ma20 || 1) * 300, 5, 95);
        const momentumScore = _clamp(50 + changePct * 4, 5, 95);
        const liquidityScore = _clamp(volRatio * 50, 5, 95);
        const rangeScore  = _clamp(high20 > low20 ? (close - low20) / (high20 - low20) * 100 : 50, 5, 95);
        const maAlignScore = _clamp(50 + (close > ma5 ? 16 : -16) + (ma5 > ma20 ? 16 : -16) + (ma20 > ma60 ? 12 : -12), 5, 95);

        const closeTxt  = close  ? close.toFixed(2)   : "N/A";
        const changeTxt = s.change != null ? (s.change >= 0 ? "+" : "") + s.change.toFixed(2) : "";
        const pctTxt    = changePct ? (changePct >= 0 ? "+" : "") + changePct.toFixed(2) + "%" : "";

        // Destroy old instances
        ["trend", "radar", "vol"].forEach(t => {
          const key = `${code}-${t}`;
          if (_pscCharts[key]) { _pscCharts[key].destroy(); delete _pscCharts[key]; }
        });

        div.innerHTML = `
          <div class="psc-grid">
            <div class="psc-card">
              <div class="psc-title">近期收盤趨勢</div>
              <div class="psc-canvas-wrap"><canvas id="psc-trend-${code}"></canvas></div>
              <div class="psc-meta">${s.market || ""}&nbsp;｜&nbsp;收盤 ${closeTxt}&nbsp;${changeTxt}&nbsp;(${pctTxt})</div>
            </div>
            <div class="psc-card">
              <div class="psc-title">技術強弱雷達</div>
              <div class="psc-canvas-wrap"><canvas id="psc-radar-${code}"></canvas></div>
              <div class="psc-meta">量能比 ${s.volRatio != null ? s.volRatio.toFixed(2) : "N/A"}&nbsp;｜&nbsp;區間 ${(s.low20 || 0).toFixed(0)}－${(s.high20 || 0).toFixed(0)}</div>
            </div>
            <div class="psc-card">
              <div class="psc-title">量能比較（張）</div>
              <div class="psc-canvas-wrap"><canvas id="psc-vol-${code}"></canvas></div>
              <div class="psc-meta">今日 vs 5日均 vs 20日均</div>
            </div>
          </div>`;

        // Chart 1: Price trend line + MA5 + MA20
        if (recentCloses.length > 0) {
          const ctx = document.getElementById(`psc-trend-${code}`);
          if (ctx) {
            _pscCharts[`${code}-trend`] = new Chart(ctx, {
              type: "line",
              data: {
                labels: recentDates,
                datasets: [
                  { label: "收盤", data: recentCloses, borderColor: "#0d9488", backgroundColor: "rgba(13,148,136,.08)", fill: true, tension: 0.35, pointRadius: 3, pointHoverRadius: 5 },
                  { label: "MA5",  data: recentCloses.map(() => ma5),  borderColor: "#f59e0b", borderDash: [4, 4], backgroundColor: "transparent", pointRadius: 0, tension: 0 },
                  { label: "MA20", data: recentCloses.map(() => ma20), borderColor: "#0ea5e9", borderDash: [6, 3], backgroundColor: "transparent", pointRadius: 0, tension: 0 },
                ]
              },
              options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { position: "bottom", labels: { boxWidth: 10, font: { size: 9 } } } },
                scales: {
                  y: { grid: { color: "#e2e8f0" }, ticks: { font: { size: 9 } } },
                  x: { grid: { display: false }, ticks: { font: { size: 9 } } }
                }
              }
            });
          }
        }

        // Chart 2: Radar
        const radarCtx = document.getElementById(`psc-radar-${code}`);
        if (radarCtx) {
          _pscCharts[`${code}-radar`] = new Chart(radarCtx, {
            type: "radar",
            data: {
              labels: ["技術面", "動能", "量能", "區間位置", "均線多頭"],
              datasets: [{
                label: "評分",
                data: [techScore, momentumScore, liquidityScore, rangeScore, maAlignScore],
                backgroundColor: "rgba(13,148,136,.18)",
                borderColor: "#0d9488",
                pointBackgroundColor: "#0d9488",
                pointRadius: 3,
              }]
            },
            options: {
              responsive: true, maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: {
                r: {
                  suggestedMin: 0, suggestedMax: 100,
                  angleLines: { color: "#cbd5e1" }, grid: { color: "#e2e8f0" },
                  pointLabels: { font: { size: 9 }, color: "#334155" },
                  ticks: { display: false }
                }
              }
            }
          });
        }

        // Chart 3: Volume bar
        const volCtx = document.getElementById(`psc-vol-${code}`);
        if (volCtx) {
          _pscCharts[`${code}-vol`] = new Chart(volCtx, {
            type: "bar",
            data: {
              labels: ["今日量", "5日均", "20日均"],
              datasets: [{
                data: [todayVol, Math.round(vol5avg), Math.round(vol20avg)],
                backgroundColor: ["#0d9488", "#f59e0b", "#94a3b8"],
                borderRadius: 5, borderWidth: 0,
              }]
            },
            options: {
              responsive: true, maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: {
                y: { grid: { color: "#e2e8f0" }, ticks: { font: { size: 9 }, callback: v => v >= 10000 ? (v / 10000).toFixed(1) + "萬" : v } },
                x: { grid: { display: false }, ticks: { font: { size: 10 } } }
              }
            }
          });
        }
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function findSectionHeading(title) {
      const headings = [...document.querySelectorAll("#report h1, #report h2, #report h3")];
      return headings.find((h) => h.textContent.trim().includes(title)) || null;
    }

    function parseAdviceToList(adviceText) {
      const lines = String(adviceText || "")
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean)
        .map((line) => line.replace(/^[-*•]\s*/, ""));
      return lines.length ? lines.slice(0, 5) : ["建議觀望，等待量縮止穩後再評估進場。"];
    }

    function createChartPayloadFromSnapshot(s) {
      const history = (s.history || []).slice(-10);
      const closes = history.map((x) => x.close).filter((n) => Number.isFinite(n));
      const volumesLots = history.map((x) => Math.round((x.volume || 0) / 1000));
      const dates = history.map((x) => x.date);
      const ma = (arr, n) => {
        const sample = arr.slice(-Math.min(n, arr.length));
        if (!sample.length) return null;
        return sample.reduce((a, b) => a + b, 0) / sample.length;
      };
      const high20 = closes.length ? Math.max(...closes) : s.close;
      const low20 = closes.length ? Math.min(...closes) : s.close;
      const vol5avg = ma(volumesLots, 5);
      const vol20avg = ma(volumesLots, 20);
      const volRatio = (vol5avg && vol20avg) ? vol5avg / vol20avg : 1;
      const todayVol = volumesLots.length ? volumesLots[volumesLots.length - 1] : 0;

      return {
        code: s.code,
        name: s.name,
        market: "上市",
        close: Number.isFinite(s.close) ? Number(s.close.toFixed(2)) : null,
        change: Number.isFinite(s.change) ? Number(s.change.toFixed(2)) : null,
        changePct: Number.isFinite(s.changePct) ? Number(s.changePct.toFixed(2)) : null,
        open: Number.isFinite(s.open) ? Number(s.open.toFixed(2)) : null,
        high: Number.isFinite(s.high) ? Number(s.high.toFixed(2)) : null,
        low: Number.isFinite(s.low) ? Number(s.low.toFixed(2)) : null,
        volume: todayVol,
        ma5: ma(closes, 5) ? Number(ma(closes, 5).toFixed(2)) : null,
        ma20: ma(closes, 20) ? Number(ma(closes, 20).toFixed(2)) : null,
        ma60: ma(closes, 60) ? Number(ma(closes, 60).toFixed(2)) : null,
        high20: Number.isFinite(high20) ? Number(high20.toFixed(2)) : null,
        low20: Number.isFinite(low20) ? Number(low20.toFixed(2)) : null,
        volRatio: Number.isFinite(volRatio) ? Number(volRatio.toFixed(2)) : null,
        vol5avg: Number.isFinite(vol5avg) ? Math.round(vol5avg) : null,
        vol20avg: Number.isFinite(vol20avg) ? Math.round(vol20avg) : null,
        recentCloses: closes.map((n) => Number(n.toFixed(2))),
        recentVolumes: volumesLots,
        recentDates: dates
      };
    }

    function findLiveSnapshotByCode(code) {
      return liveStockSnapshots.find((s) => s.code === code) || null;
    }

    async function generateStockAdvice(stock) {
      const fallback = [
        `趨勢：${stock.name} 今日漲跌幅 ${formatPct(stock.changePct)}，短線請觀察是否站回短均。`,
        `關鍵價位：可先看今日高低區間 ${stock.low?.toFixed(2) || "--"} ~ ${stock.high?.toFixed(2) || "--"}。`,
        "量價：留意成交量是否放大且價格同步轉強。",
        "風險：大盤波動、產業消息與法人動向皆可能放大震盪。",
        "行動建議：先分批、小部位，並設好停損紀律。"
      ];

      if (!geminiApiKey) return fallback;

      const prompt = `你是台股分析助理。請針對股票 ${stock.code} ${stock.name}，輸出 5 點繁中建議，每點一句，格式如下：\n- 趨勢：...\n- 關鍵價位：...\n- 量價：...\n- 風險：...\n- 行動建議：...\n\n資料：收盤 ${stock.close}, 漲跌 ${stock.change}, 漲跌幅 ${stock.changePct.toFixed(2)}%, 開高低 ${stock.open}/${stock.high}/${stock.low}`;

      try {
        const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + encodeURIComponent(geminiApiKey), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { maxOutputTokens: 420, thinkingConfig: { thinkingBudget: 0 } }
          })
        });

        if (!res.ok) throw new Error("AI API 失敗");
        const json = await res.json();
        const text = json?.candidates?.[0]?.content?.parts?.map((p) => p.text || "").join("\n") || "";
        const parsed = parseAdviceToList(text);
        return parsed.length ? parsed : fallback;
      } catch (e) {
        return fallback;
      }
    }

    function removeStockAnalysisByCode(code) {
      const report = document.getElementById("report");
      report.querySelectorAll(`.dynamic-stock-analysis[data-code="${code}"]`).forEach((el) => el.remove());

      const headings = [...report.querySelectorAll("h2")];
      const start = headings.find((h) => new RegExp(`^${code}\\s`).test(h.textContent.trim()));
      if (!start) return;

      let node = start;
      while (node) {
        const next = node.nextSibling;
        const stopAt = node !== start
          && node.nodeType === 1
          && node.matches("h1, h2")
          && (node.textContent.includes("自選股綜合評價") || /^\d{4}\s/.test(node.textContent.trim()));
        if (stopAt) break;
        node.remove();
        node = next;
      }
    }

    function appendStockAnalysis(stock, adviceList) {
      removeStockAnalysisByCode(stock.code);

      const report = document.getElementById("report");
      const target = findSectionHeading("自選股綜合評價");
      const payload = createChartPayloadFromSnapshot(stock);
      const adviceHtml = adviceList.map((x) => `<li>${escapeHtml(x)}</li>`).join("");
      const block = document.createElement("section");
      block.className = "dynamic-stock-analysis";
      block.setAttribute("data-code", stock.code);
      block.innerHTML = `
        <h2>${escapeHtml(stock.code)} ${escapeHtml(stock.name)}</h2>
        <h3>1. 圖表顯示</h3>
        <div class="stock-chart-block" data-stock='${JSON.stringify(payload).replace(/'/g, "&#39;")}'></div>
        <h3>2. 小G建議</h3>
        <ul>${adviceHtml}</ul>
        <h3>3. 近期新聞</h3>
        <ul><li>即時新聞載入中，建議在一鍵更新流程中取得完整新聞摘要。</li></ul>
        <hr />`;

      if (target) {
        report.insertBefore(block, target);
      } else {
        report.appendChild(block);
      }

      syncStockAnalysisSection();
      renderPerStockCharts();
    }

    function collectStockAnalysisNodes(startHeading) {
      const nodes = [];
      let node = startHeading;
      while (node) {
        const next = node.nextSibling;
        const stopAt = node !== startHeading
          && node.nodeType === 1
          && node.matches("h1, h2")
          && (node.textContent.includes("自選股綜合評價") || /^\d{4}\s/.test(node.textContent.trim()));
        if (stopAt) break;
        nodes.push(node);
        node = next;
      }
      return nodes;
    }

    function syncStockAnalysisSection() {
      const report = document.getElementById("report");
      const target = findSectionHeading("自選股綜合評價");
      if (!report || !target) return;

      const trackedSet = new Set(trackedStocks.map((s) => s.code));

      // 先移除不在追蹤清單內的分析區塊
      [...report.querySelectorAll("h2")]
        .filter((h) => /^\d{4}\s/.test(h.textContent.trim()))
        .forEach((h) => {
          const code = h.textContent.trim().slice(0, 4);
          if (!trackedSet.has(code)) {
            collectStockAnalysisNodes(h).forEach((n) => n.remove());
          }
        });

      // 再按照追蹤清單順序重排現有分析區塊
      for (let i = 0; i < trackedStocks.length; i += 1) {
        const code = trackedStocks[i].code;
        const heading = [...report.querySelectorAll("h2")].find((h) => new RegExp(`^${code}\\s`).test(h.textContent.trim()));
        if (!heading) continue;
        const nodes = collectStockAnalysisNodes(heading);
        nodes.forEach((n) => report.insertBefore(n, target));
      }
    }

    function getLatestStockName(code) {
      const hit = findLiveSnapshotByCode(code);
      if (hit) return hit.name;
      const tracked = trackedStocks.find((s) => s.code === code);
      return tracked ? tracked.name : code;
    }

    function generateOverallEvaluationRuleBased(stocks) {
      const today = new Date().toLocaleDateString("zh-TW", { year: "numeric", month: "2-digit", day: "2-digit" });
      const avgChangePct = stocks.reduce((a, s) => a + (s.changePct || 0), 0) / stocks.length;
      const risingCount = stocks.filter((s) => (s.changePct || 0) > 0).length;
      const aboveMA5Count = stocks.filter((s) => s.close && s.ma5 && s.close > s.ma5).length;
      let trend;
      if (avgChangePct > 1) trend = "整體偏強，多頭氣氛為主。";
      else if (avgChangePct < -1) trend = "整體偏弱，短線賣壓較重。";
      else trend = "整體震盪整理，多空力道相當。";
      const strengthText = `今日自選股平均漲跌幅為 ${avgChangePct.toFixed(2)}%，${stocks.length} 檔中 ${risingCount} 檔上漲，${aboveMA5Count} 檔收盤站上 5 日均線。${trend}`;

      const riskSorted = [...stocks].sort((a, b) => {
        const rA = Math.abs(a.changePct || 0) * (a.volRatio || 1);
        const rB = Math.abs(b.changePct || 0) * (b.volRatio || 1);
        return rB - rA;
      });
      const riskLabels = ["風險最高", "風險次高", "風險中等", "風險次低", "風險最低"];
      const riskItems = riskSorted.map((s, i) => {
        const pct = Math.abs(s.changePct || 0).toFixed(2);
        const vr = (s.volRatio || 1).toFixed(2);
        const dir = (s.changePct || 0) >= 0 ? "上漲" : "下跌";
        const label = riskLabels[Math.min(i, riskLabels.length - 1)];
        return `<li><strong>${escapeHtml(s.name)}（${escapeHtml(s.code)}）</strong>：${label}，今日${dir} ${pct}%，量能比 ${vr}。</li>`;
      }).join("");

      const watchItems = stocks.map((s) => {
        const above5 = s.ma5 && s.close > s.ma5;
        const ma5Str = s.ma5 ? s.ma5.toFixed(2) : "--";
        const supportStr = above5 ? ma5Str : (s.ma20 ? s.ma20.toFixed(2) : "--");
        const resistStr = !above5 ? ma5Str : (s.high20 ? s.high20.toFixed(2) : "--");
        const posLabel = s.ma5 ? (above5 ? "站上" : "跌破") : "未知";
        return `<li><strong>${escapeHtml(s.name)}（${escapeHtml(s.code)}）</strong>：收盤 ${s.close?.toFixed(2) || "--"}，${posLabel} 5日均線（${ma5Str}），支撐參考 ${supportStr}，壓力參考 ${resistStr}。</li>`;
      }).join("");

      return `
        <p>以下為根據即時行情自動生成的投資組合評估（${today}）：</p>
        <h3>1. 整體強弱評估</h3>
        <p>${strengthText}</p>
        <h3>2. 風險排序（由高到低）</h3>
        <ol>${riskItems}</ol>
        <h3>3. 明日重點觀察</h3>
        <ul>${watchItems}</ul>
        <h3>4. 免責聲明</h3>
        <p>以上分析僅供參考，不構成任何投資建議，投資人應獨立判斷並自負盈虧。</p>
        <hr />
        <p><em>資料來源：台灣證券交易所、雅虎財經、Google Gemini AI</em></p>
        <p><em>本報告僅供參考，不構成任何投資建議。</em></p>
      `;
    }

    async function generateOverallEvaluationFromGemini(stocks) {
      const stockSummary = stocks.map((s) =>
        `${s.code} ${s.name}: 收盤${s.close?.toFixed(2)}, 漲跌幅${(s.changePct || 0).toFixed(2)}%, MA5=${s.ma5?.toFixed(2)}, MA20=${s.ma20?.toFixed(2)}, 量能比=${(s.volRatio || 1).toFixed(2)}`
      ).join("\n");
      const prompt = `你是台股投資組合分析師。以下是今日自選股即時資料：\n${stockSummary}\n\n請用繁體中文輸出（勿加多餘說明）：\n1. 整體強弱評估（2-3句，說明今日整體強弱與均線位置）\n2. 風險排序（由高到低，每檔一句，說明理由）\n3. 明日重點觀察（每檔一個具體觀察點，含關鍵價位）\n4. 免責聲明（固定一句）`;
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(geminiApiKey)}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { maxOutputTokens: 800, thinkingConfig: { thinkingBudget: 0 } }
          })
        });
        if (!res.ok) throw new Error("API error");
        const json = await res.json();
        const text = json?.candidates?.[0]?.content?.parts?.map((p) => p.text || "").join("\n") || "";
        if (!text) throw new Error("empty");
        const today = new Date().toLocaleDateString("zh-TW", { year: "numeric", month: "2-digit", day: "2-digit" });
        return `
          <p>以下為 AI 生成的投資組合評估（${today}）：</p>
          ${marked.parse(text)}
          <hr />
          <p><em>資料來源：台灣證券交易所、雅虎財經、Google Gemini AI</em></p>
          <p><em>本報告僅供參考，不構成任何投資建議。</em></p>
        `;
      } catch (e) {
        return generateOverallEvaluationRuleBased(stocks);
      }
    }

    async function syncOverallEvaluation() {
      const report = document.getElementById("report");
      const heading = findSectionHeading("自選股綜合評價");
      if (!heading || !report) return;

      // Remove everything after the heading
      let node = heading.nextSibling;
      while (node) {
        const next = node.nextSibling;
        node.remove();
        node = next;
      }

      const liveStocks = trackedStocks
        .map((s) => findLiveSnapshotByCode(s.code))
        .filter(Boolean);

      if (!liveStocks.length) {
        const ph = document.createElement("p");
        ph.textContent = "尚無即時資料，請稍後再試。";
        report.appendChild(ph);
        return;
      }

      const container = document.createElement("div");
      container.id = "overallEvaluationContent";
      container.innerHTML = geminiApiKey
        ? await generateOverallEvaluationFromGemini(liveStocks)
        : generateOverallEvaluationRuleBased(liveStocks);
      report.appendChild(container);
    }

    async function addStockByCode(code, statusEl) {
      if (!/^\d{4}$/.test(code)) {
        statusEl.textContent = "請輸入 4 位數股票代碼。";
        return;
      }
      if (trackedStocks.some((s) => s.code === code)) {
        statusEl.textContent = `${code} 已在清單中。`;
        return;
      }

      statusEl.textContent = `正在新增 ${code}...`;
      const dayAllResult = await fetchStockDayAll();
      const quote = dayAllResult.json.find((x) => x.Code === code);
      if (!quote) {
        statusEl.textContent = `查無 ${code}，請確認代碼。`;
        return;
      }

      trackedStocks.push({ code, name: quote.Name || code });
      persistTrackedStocks();
      const snapshots = await bootstrapRealData();
      const stock = snapshots.find((x) => x.code === code);
      if (!stock) {
        renderInteractiveStockManager();
        document.getElementById("stockManagerStatus").textContent = `${code} 新增成功，但暫時抓不到完整歷史資料。`;
        return;
      }

      const advice = await generateStockAdvice(stock);
      appendStockAnalysis(stock, advice);
      renderInteractiveStockManager();
      await syncOverallEvaluation();
      document.getElementById("stockManagerStatus").textContent = `${code} 已新增，並完成即時 AI 建議。`;
    }

    async function removeStockByCode(code, statusEl) {
      trackedStocks = trackedStocks.filter((s) => s.code !== code);
      persistTrackedStocks();
      removeStockAnalysisByCode(code);
      renderInteractiveStockManager();
      await bootstrapRealData();
      syncStockAnalysisSection();
      renderPerStockCharts();
      await syncOverallEvaluation();
      document.getElementById("stockManagerStatus").textContent = `${code} 已移除。`;
    }

    async function reorderStockByCode(sourceCode, targetCode) {
      if (!sourceCode || !targetCode || sourceCode === targetCode) return;
      const fromIndex = trackedStocks.findIndex((s) => s.code === sourceCode);
      const toIndex = trackedStocks.findIndex((s) => s.code === targetCode);
      if (fromIndex < 0 || toIndex < 0) return;

      const [moved] = trackedStocks.splice(fromIndex, 1);
      trackedStocks.splice(toIndex, 0, moved);
      persistTrackedStocks();
      renderInteractiveStockManager();
      await bootstrapRealData();
      syncStockAnalysisSection();
      renderPerStockCharts();
      await syncOverallEvaluation();
      document.getElementById("stockManagerStatus").textContent = `已將 ${sourceCode} 排序到 ${targetCode} 前方。`;
    }

    function syncReportStockList() {
      const listHeading = findSectionHeading("自選股清單");
      if (!listHeading) return;

      let listEl = document.getElementById("dynamicStockList");
      if (!listEl) {
        listEl = document.createElement("ul");
        listEl.id = "dynamicStockList";
        const manager = document.getElementById("interactiveStockManager");
        if (manager) {
          manager.insertAdjacentElement("afterend", listEl);
        } else {
          listHeading.insertAdjacentElement("afterend", listEl);
        }
      }

      const items = trackedStocks.map((s) => `<li>${escapeHtml(s.code)} ${escapeHtml(getLatestStockName(s.code))}</li>`).join("");
      listEl.innerHTML = items || "<li>目前尚無追蹤股票</li>";
    }

    function renderInteractiveStockManager() {
      const host = document.getElementById("interactiveStockManager");
      if (!host) return;
      const tags = trackedStocks.map((s) => `
        <li class="stock-tag-item" draggable="true" data-code="${escapeHtml(s.code)}">
          <span>${escapeHtml(s.code)} ${escapeHtml(getLatestStockName(s.code))}</span>
          <button class="sm-btn remove" data-code="${escapeHtml(s.code)}" title="移除">-</button>
        </li>
      `).join("");
      host.innerHTML = `
        <div class="stock-manager">
          <div class="stock-manager-row">
            <input id="stockCodeInput" type="text" placeholder="輸入 4 位數代碼，例如 2330" maxlength="4" />
            <button id="stockAddBtn" class="sm-btn add">+ 新增股票</button>
          </div>
          <ul class="stock-tags">${tags || "<li>目前尚無股票</li>"}</ul>
          <p class="stock-manager-hint">按 + 新增、按 - 刪除，可拖曳標籤排序。新增後會即時補上該股 AI 建議與圖表。</p>
          <p class="stock-manager-hint" id="stockManagerStatus"></p>
        </div>
      `;

      const statusEl = document.getElementById("stockManagerStatus");
      const inputEl = document.getElementById("stockCodeInput");
      document.getElementById("stockAddBtn")?.addEventListener("click", async () => {
        const code = (inputEl.value || "").trim();
        await addStockByCode(code, statusEl);
        inputEl.value = "";
      });

      host.querySelectorAll(".sm-btn.remove").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const code = btn.getAttribute("data-code");
          await removeStockByCode(code, statusEl);
        });
      });

      host.querySelectorAll(".stock-tag-item").forEach((item) => {
        item.addEventListener("dragstart", (e) => {
          item.classList.add("dragging");
          e.dataTransfer?.setData("text/plain", item.getAttribute("data-code") || "");
          if (e.dataTransfer) e.dataTransfer.effectAllowed = "move";
        });

        item.addEventListener("dragend", () => {
          host.querySelectorAll(".stock-tag-item").forEach((li) => li.classList.remove("dragging", "drag-over"));
        });

        item.addEventListener("dragover", (e) => {
          e.preventDefault();
          item.classList.add("drag-over");
          if (e.dataTransfer) e.dataTransfer.dropEffect = "move";
        });

        item.addEventListener("dragleave", () => {
          item.classList.remove("drag-over");
        });

        item.addEventListener("drop", async (e) => {
          e.preventDefault();
          item.classList.remove("drag-over");
          const sourceCode = e.dataTransfer?.getData("text/plain") || "";
          const targetCode = item.getAttribute("data-code") || "";
          await reorderStockByCode(sourceCode, targetCode);
        });
      });

      syncReportStockList();
    }

    function initInteractiveStockManager() {
      const listHeading = findSectionHeading("自選股清單");
      if (!listHeading) return;
      const oldList = listHeading.nextElementSibling && listHeading.nextElementSibling.tagName === "UL"
        ? listHeading.nextElementSibling
        : null;

      const existing = document.getElementById("interactiveStockManager");
      if (!existing) {
        const mount = document.createElement("div");
        mount.id = "interactiveStockManager";
        listHeading.insertAdjacentElement("afterend", mount);
      }
      if (oldList) {
        oldList.id = "dynamicStockList";
        oldList.style.display = "block";
      }

      renderInteractiveStockManager();
      syncReportStockList();
      syncStockAnalysisSection();
      renderPerStockCharts();
    }

    // 啟動：同時更新文字報告與真實行情資料
    (async () => {
      await renderLatestReport();
      renderPerStockCharts();
      initInteractiveStockManager();
      await bootstrapRealData();
      await syncOverallEvaluation();
    })();
  </script>
</body>
</html>
