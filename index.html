<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>台股自選股 AI 報告</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #d9cbb8;
      --card: #ffffff;
      --text: #1e1f27;
      --muted: #6b7280;
      --accent: #0d9488;
      --accent-2: #f59e0b;
      --accent-soft: #ccfbf1;
      --border: #e5e7eb;
      --shadow: 0 14px 38px rgba(15, 23, 42, 0.1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 28px 16px;
    }
    .container {
      width: min(1100px, 100%);
      margin: 0 auto;
    }
    .hero {
      background: linear-gradient(140deg, #0f766e, #0e7490 60%, #0369a1);
      color: #fff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 16px 44px rgba(8, 47, 73, 0.28);
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: "";
      position: absolute;
      right: -40px;
      top: -30px;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 36px);
      font-family: "Sora", "Noto Sans TC", sans-serif;
      letter-spacing: 0.4px;
    }
    .hero p { margin: 0; opacity: 0.95; }
    .meta {
      margin-top: 12px;
      font-size: 13px;
      opacity: 0.9;
    }
    .kpis {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .kpi {
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 14px;
      padding: 10px 12px;
      backdrop-filter: blur(2px);
    }
    .kpi .label {
      font-size: 12px;
      opacity: 0.85;
    }
    .kpi .value {
      margin-top: 4px;
      font-family: "Sora", "Noto Sans TC", sans-serif;
      font-size: 20px;
      font-weight: 700;
    }
    .dashboard {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      box-shadow: var(--shadow);
      min-height: 280px;
      animation: riseIn .5s ease;
    }
    .panel h3 {
      margin: 0 0 10px;
      font-size: 15px;
      color: #0f172a;
      letter-spacing: 0.2px;
    }
    .canvas-wrap {
      position: relative;
      height: 220px;
    }
    @keyframes riseIn {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .report {
      margin-top: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow);
      line-height: 1.8;
    }
    h1, h2, h3, h4 { line-height: 1.3; }
    h1 { font-size: 28px; }
    h2 {
      font-size: 22px;
      margin-top: 34px;
      margin-bottom: 12px;
      color: #0f766e;
      border-left: 6px solid #14b8a6;
      padding-left: 10px;
    }
    h3 { font-size: 19px; margin-top: 24px; margin-bottom: 10px; color: #0f172a; }
    h4 { font-size: 16px; margin-top: 16px; margin-bottom: 8px; }
    .report p { margin: 10px 0; }
    .report li { margin: 6px 0; }
    .report strong { color: #0f172a; }
    hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }
    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9em;
    }
    ul, ol { padding-left: 1.2rem; }
    blockquote {
      margin: 0;
      padding: 10px 14px;
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 8px;
    }
    .tip {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .status {
      margin-top: 8px;
      color: #475569;
      font-size: 13px;
    }
    .status.warn { color: #b45309; }
    .status.ok { color: #0f766e; }
    @media (max-width: 960px) {
      .dashboard { grid-template-columns: 1fr; }
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .panel { min-height: 250px; }
      .canvas-wrap { height: 190px; }
    }
  </style>
</head>
<body>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    const markdownText = `# 臭屁屁的股票 = 臭屁股

你好！我是你的台股研究助理。針對你的波段操作需求，我已重新調整邏輯，將「族群輪動」與「資金流向」放在首位，並強化了支撐壓力位與風險控管的說明。

📋 今日偏好摘要

追蹤個股：欣興 (3037)、臻鼎-KY (4958)、景碩 (3189)、南電 (8046) —— 鎖定 ABF/PCB 族群。

核心指標：均線位階、成交量變化、三大法人買賣超、支撐壓力。

順序調整：採「族群輪動優先」原則。

新聞呈現：嚴格區分「利多/利空」，快速過濾雜訊。

風控機制：明確標註「追高提醒」與「停損規則」。

📊 區塊 A：自選個股分析 (3037、4958、3189、8046)
1. 3037 欣興
趨勢判斷：多頭排列，處於上升通道。

關鍵價位：支撐 185 / 壓力 205。

量價觀察：成交量緩步放大，未見失控。

法人動向：外資連 3 買，投信買盤力道增強。

風險提醒：接近 200 元整數關卡，若爆量不漲需留心。

行動建議：續抱。分批進場點建議參考 5MA 回測。

2. 4958 臻鼎-KY
趨勢判斷：區間震盪偏多，站穩所有均線。

關鍵價位：支撐 118 / 壓力 132.5。

量價觀察：量縮整理，等待突破關鍵壓力。

法人動向：法人維持中性操作。

風險提醒：月線若跌破，波段趨勢轉弱。

行動建議：分批買進。站穩 125 後加碼。

3. 3189 景碩
趨勢判斷：底部轉強，試圖挑戰季線。

趨勢判斷：相對弱勢，均線糾結中。

量價觀察：成交量低迷，缺乏主流資金帶動。

法人動向：外資持續調節。

風險提醒：180 元若跌破，恐回測前低。

行動建議：觀望。目前資金效率低，暫不建倉。

🚀 區塊 B：AI 產業動向與推薦
推薦關注股票：

6274 台燿：高頻高速板需求強勁，均線多頭排列。

2368 金像電：網通板龍頭，波段趨勢明確，站穩關鍵支撐。

✉️ 每日投資分析短文 (可直接複製貼上)
【2026/05/10 盤後分析報告】

● 族群分析

族群排名：AI PCB > 散熱 > IC 設計。

輪動解讀：資金從高檔 AI 股流向低位階的設備股，呈現良性輪動。

續航力：PCB 族群資金流向佔比提升，題材續航力強。

● 重大新聞

【利多】：美股科技股昨日大漲，激勵台股電子盤；多家 PCB 廠 4 月營收創新高。

● 明日觀察清單

欣興 (3037)：觀察 200 元壓力能否帶量突破。

台光電 (2383)：關注投信是否連續買超。

美債殖利率：影響電子股本益比修正。

【一鍵白話版】
今天大盤還不錯，電子股是主角。你的欣興很強，抱好就對了；南電還在睡，先別理它。買股票不要衝動追高，等它掉到支撐位再買，如果跌破月線就先跑路，保住本金最重要。

內容僅供研究與教育用途，不構成任何投資建議。投資有風險，入市需謹慎。
`;

    const trackedStocks = [
      { code: "3037", name: "欣興" },
      { code: "4958", name: "臻鼎-KY" },
      { code: "3189", name: "景碩" },
      { code: "8046", name: "南電" }
    ];

    const chartFont = {
      family: "Sora, Noto Sans TC, sans-serif",
      size: 11
    };

    Chart.defaults.color = "#334155";
    Chart.defaults.font = chartFont;

    let trendChart;
    let radarChart;
    let mixChart;

    function parseNumber(value) {
      if (value === null || value === undefined) return NaN;
      const cleaned = String(value).replace(/,/g, "").replace(/\+/g, "").trim();
      const n = Number(cleaned);
      return Number.isFinite(n) ? n : NaN;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function formatPct(v) {
      return `${v >= 0 ? "+" : ""}${v.toFixed(2)}%`;
    }

    function formatDateTime(dt) {
      return new Intl.DateTimeFormat("zh-TW", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(dt);
    }

    async function fetchStockDayAll() {
      const res = await fetch("https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL", { cache: "no-store" });
      if (!res.ok) throw new Error(`STOCK_DAY_ALL failed: ${res.status}`);
      return res.json();
    }

    async function fetchStockHistory(code) {
      const now = new Date();
      const dateParam = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, "0")}01`;
      const url = `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${dateParam}&stockNo=${code}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`STOCK_DAY ${code} failed: ${res.status}`);
      const json = await res.json();
      if (json.stat !== "OK" || !Array.isArray(json.data) || !json.data.length) {
        throw new Error(`No history for ${code}`);
      }
      return json.data.slice(-5).map((row) => ({
        date: String(row[0]).replace(/^\d+\//, ""),
        close: parseNumber(row[6]),
        change: parseNumber(row[7]),
        volume: parseNumber(row[1]),
        tradeValue: parseNumber(row[2])
      }));
    }

    function createCharts(stocks, labels) {
      const palette = ["#0d9488", "#f59e0b", "#0ea5e9", "#a855f7"];
      const trendDatasets = stocks.map((s, idx) => ({
        label: `${s.code} ${s.name}`,
        data: s.history.map((d) => d.close),
        borderColor: palette[idx % palette.length],
        backgroundColor: "transparent",
        tension: 0.35,
        pointRadius: 2.5
      }));

      trendChart = new Chart(document.getElementById("trendChart"), {
        type: "line",
        data: { labels, datasets: trendDatasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: "bottom" } },
          scales: {
            y: { grid: { color: "#e2e8f0" } },
            x: { grid: { display: false } }
          }
        }
      });

      const technical = clamp(50 + stocks.reduce((acc, s) => {
        const closes = s.history.map((h) => h.close);
        const ma5 = closes.reduce((a, b) => a + b, 0) / closes.length;
        return acc + ((s.close - ma5) / ma5) * 400;
      }, 0) / stocks.length, 5, 95);

      const momentum = clamp(50 + stocks.reduce((acc, s) => acc + s.changePct * 4, 0) / stocks.length, 5, 95);
      const liquidity = clamp(30 + stocks.reduce((acc, s) => acc + (s.tradeValue / 1e8), 0) / stocks.length, 5, 95);
      const winRate = clamp((stocks.filter((s) => s.change > 0).length / stocks.length) * 100, 5, 95);

      const avg = stocks.reduce((a, s) => a + s.changePct, 0) / stocks.length;
      const variance = stocks.reduce((a, s) => a + Math.pow(s.changePct - avg, 2), 0) / stocks.length;
      const volatilityControl = clamp(95 - Math.sqrt(variance) * 14, 5, 95);

      radarChart = new Chart(document.getElementById("radarChart"), {
        type: "radar",
        data: {
          labels: ["技術面", "動能", "量能", "上漲家數", "波動可控"],
          datasets: [{
            label: "今日評分",
            data: [technical, momentum, liquidity, winRate, volatilityControl],
            backgroundColor: "rgba(14,116,144,0.22)",
            borderColor: "#0e7490",
            pointBackgroundColor: "#0e7490"
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            r: {
              suggestedMin: 0,
              suggestedMax: 100,
              angleLines: { color: "#cbd5e1" },
              grid: { color: "#e2e8f0" },
              pointLabels: { color: "#0f172a" }
            }
          }
        }
      });

      mixChart = new Chart(document.getElementById("mixChart"), {
        type: "doughnut",
        data: {
          labels: stocks.map((s) => `${s.code} ${s.name}`),
          datasets: [{
            data: stocks.map((s) => s.tradeValue),
            backgroundColor: ["#0d9488", "#0ea5e9", "#f59e0b", "#94a3b8"],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: "68%",
          plugins: { legend: { position: "bottom" } }
        }
      });
    }

    function renderKpis(stocks) {
      const avgMove = stocks.reduce((acc, s) => acc + s.changePct, 0) / stocks.length;
      const leader = [...stocks].sort((a, b) => b.changePct - a.changePct)[0];
      const volatility = Math.sqrt(stocks.reduce((acc, s) => acc + Math.pow(s.changePct - avgMove, 2), 0) / stocks.length);
      const risk = volatility >= 5 ? "高" : volatility >= 2.5 ? "中" : "低";

      document.getElementById("kpiCount").textContent = String(stocks.length);
      document.getElementById("kpiLeader").textContent = `${leader.code} ${formatPct(leader.changePct)}`;
      document.getElementById("kpiAvgMove").textContent = formatPct(avgMove);
      document.getElementById("kpiRisk").textContent = risk;
      document.getElementById("metaUpdated").textContent = `最後更新：${formatDateTime(new Date())}`;
    }

    async function bootstrapRealData() {
      const statusEl = document.getElementById("fetchStatus");
      try {
        const dayAll = await fetchStockDayAll();
        const byCode = new Map(dayAll.map((x) => [x.Code, x]));

        const histories = await Promise.all(trackedStocks.map((s) => fetchStockHistory(s.code)));

        const stocks = trackedStocks.map((stock, idx) => {
          const daily = byCode.get(stock.code);
          if (!daily) throw new Error(`查無 ${stock.code} 的當日資料`);

          const close = parseNumber(daily.ClosingPrice);
          const change = parseNumber(daily.Change);
          const prevClose = close - change;
          const changePct = prevClose ? (change / prevClose) * 100 : 0;

          return {
            ...stock,
            close,
            change,
            changePct,
            tradeValue: parseNumber(daily.TradeValue),
            history: histories[idx]
          };
        });

        const labels = stocks[0].history.map((x) => x.date);
        renderKpis(stocks);
        createCharts(stocks, labels);

        statusEl.className = "status ok";
        statusEl.textContent = "已載入 TWSE 真實資料，圖表與指標均為即時抓取結果。";
      } catch (error) {
        statusEl.className = "status warn";
        statusEl.textContent = `讀取真實資料失敗：${error.message}。請確認網路或 API 可用性。`;
        document.getElementById("metaUpdated").textContent = "最後更新：資料讀取失敗";
      }
    }

    function normalizeMarkdown(raw) {
      let text = raw;

      // Add explicit section headings for better visual grouping.
      text = text
        .replace(/\n📋\s*今日偏好摘要\n/g, "\n## 📋 今日偏好摘要\n")
        .replace(/\n📊\s*區塊 A：/g, "\n## 📊 區塊 A：")
        .replace(/\n🚀\s*區塊 B：/g, "\n## 🚀 區塊 B：")
        .replace(/\n✉️\s*每日投資分析短文/g, "\n## ✉️ 每日投資分析短文")
        .replace(/\n【一鍵白話版】/g, "\n## 【一鍵白話版】")
        .replace(/\n【免責聲明】/g, "\n## 【免責聲明】");

      // Convert common label lines into bullet points under each section.
      text = text.replace(/\n(策略核心：|追蹤個股：|核心指標：|順序調整：|新聞呈現：|風控機制：)/g, "\n- $1");

      // Improve sub-section readability for numbered stocks and report blocks.
      text = text.replace(/\n(\d+\.\s[^\n]+)/g, "\n### $1");
      text = text.replace(/\n(●\s[^\n]+)/g, "\n### $1");

      // Ensure enough blank lines between dense chunks.
      text = text.replace(/\n{3,}/g, "\n\n");

      return text;
    }

    document.getElementById('report').innerHTML = marked.parse(normalizeMarkdown(markdownText));
    bootstrapRealData();
  </script>
</body>
