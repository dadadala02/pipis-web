  <style>
    :root {
      --bg: #f8f6ef;
      --card: #ffffff;
      --text: #1e1f27;
      --muted: #6b7280;
      --accent: #0d9488;
      --accent-2: #f59e0b;
      --accent-soft: #ccfbf1;
      --border: #e5e7eb;
      --shadow: 0 14px 38px rgba(15, 23, 42, 0.1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 0%, #fde68a 0, transparent 26%),
        radial-gradient(circle at 100% 20%, #bfdbfe 0, transparent 30%),
        radial-gradient(circle at 0% 100%, #99f6e4 0, transparent 25%),
        var(--bg);
      padding: 28px 16px;
    }
    .container {
      width: min(1100px, 100%);
      margin: 0 auto;
    }
    .hero {
      background: linear-gradient(140deg, #0f766e, #0e7490 60%, #0369a1);
      color: #fff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 16px 44px rgba(8, 47, 73, 0.28);
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: "";
      position: absolute;
      right: -40px;
      top: -30px;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 36px);
      font-family: "Sora", "Noto Sans TC", sans-serif;
      letter-spacing: 0.4px;
    }
    .hero p { margin: 0; opacity: 0.95; }
    .meta {
      margin-top: 12px;
      font-size: 13px;
      opacity: 0.9;
    }
    .kpis {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .kpi {
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 14px;
      padding: 10px 12px;
      backdrop-filter: blur(2px);
    }
    .kpi .label {
      font-size: 12px;
      opacity: 0.85;
    }
    .kpi .value {
      margin-top: 4px;
      font-family: "Sora", "Noto Sans TC", sans-serif;
      font-size: 20px;
      font-weight: 700;
    }
    .dashboard {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      box-shadow: var(--shadow);
      min-height: 280px;
      animation: riseIn .5s ease;
    }
    .panel h3 {
      margin: 0 0 10px;
      font-size: 15px;
      color: #0f172a;
      letter-spacing: 0.2px;
    }
    .canvas-wrap {
      position: relative;
      height: 220px;
    }
    @keyframes riseIn {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .report {
      margin-top: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow);
      line-height: 1.8;
    }
    h1, h2, h3, h4 { line-height: 1.3; }
    h1 { font-size: 28px; }
    h2 {
      font-size: 22px;
      margin-top: 34px;
      margin-bottom: 12px;
      color: #0f766e;
      border-left: 6px solid #14b8a6;
      padding-left: 10px;
    }
    h3 { font-size: 19px; margin-top: 24px; margin-bottom: 10px; color: #0f172a; }
    h4 { font-size: 16px; margin-top: 16px; margin-bottom: 8px; }
    .report p { margin: 10px 0; }
    .report li { margin: 6px 0; }
    .report strong { color: #0f172a; }
    hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }
    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9em;
    }
    ul, ol { padding-left: 1.2rem; }
    blockquote {
      margin: 0;
      padding: 10px 14px;
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 8px;
    }
    .tip {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 960px) {
      .dashboard { grid-template-columns: 1fr; }
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .panel { min-height: 250px; }
      .canvas-wrap { height: 190px; }
    }
  </style>
</head>

    function normalizeMarkdown(raw) {
      let text = raw;

      // Add explicit section headings for better visual grouping.
      text = text
        .replace(/\n📋\s*今日偏好摘要\n/g, "\n## 📋 今日偏好摘要\n")
        .replace(/\n📊\s*區塊 A：/g, "\n## 📊 區塊 A：")
        .replace(/\n🚀\s*區塊 B：/g, "\n## 🚀 區塊 B：")
        .replace(/\n✉️\s*每日投資分析短文/g, "\n## ✉️ 每日投資分析短文")
        .replace(/\n【一鍵白話版】/g, "\n## 【一鍵白話版】")
        .replace(/\n【免責聲明】/g, "\n## 【免責聲明】");

      // Convert common label lines into bullet points under each section.
      text = text.replace(/\n(策略核心：|追蹤個股：|核心指標：|順序調整：|新聞呈現：|風控機制：)/g, "\n- $1");

      // Improve sub-section readability for numbered stocks and report blocks.
      text = text.replace(/\n(\d+\.\s[^\n]+)/g, "\n### $1");
      text = text.replace(/\n(●\s[^\n]+)/g, "\n### $1");

      // Ensure enough blank lines between dense chunks.
      text = text.replace(/\n{3,}/g, "\n\n");

      return text;
    }
