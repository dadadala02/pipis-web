    // 將字串數字（含逗號、+號）轉成 Number
    function parseNumber(value) {
      if (value === null || value === undefined) return NaN;
      const cleaned = String(value).replace(/,/g, "").replace(/\+/g, "").trim();
      const n = Number(cleaned);
      return Number.isFinite(n) ? n : NaN;
    }

    // 限制數值範圍，避免圖表出現極端值
    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    // 格式化百分比（保留正負號）
    function formatPct(v) {
      return `${v >= 0 ? "+" : ""}${v.toFixed(2)}%`;
    }

    // 格式化時間顯示（繁中）
    function formatDateTime(dt) {
      return new Intl.DateTimeFormat("zh-TW", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(dt);
    }

    // 從多種 JSON 結構萃取 markdown 文字（含 Gemini/n8n 常見格式）
    function extractMarkdownFromPayload(payload) {
      if (typeof payload === "string") return payload;
      if (!payload || typeof payload !== "object") return "";

      const direct = payload.markdown || payload.report || payload.text;
      if (typeof direct === "string" && direct.trim()) return direct;

      if (payload.data && typeof payload.data === "object") {
        const nested = payload.data.markdown || payload.data.report || payload.data.text;
        if (typeof nested === "string" && nested.trim()) return nested;
      }

      // Gemini generateContent 原生回傳：candidates[0].content.parts[0].text
      const partsText = payload.candidates?.[0]?.content?.parts
        ?.map((p) => p && typeof p.text === "string" ? p.text : "")
        .filter(Boolean)
        .join("\n");
      if (partsText && partsText.trim()) return partsText;

      // n8n 有時會把結果包成陣列
      if (Array.isArray(payload) && payload.length) {
        for (const item of payload) {
          const value = extractMarkdownFromPayload(item);
          if (value) return value;
        }
      }

      return "";
    }

    // 讀取 Gemini 報告（支援純文字或 JSON）
    async function fetchLatestReportMarkdown() {
      if (!reportApiUrl) {
        throw new Error("未設定 reportApi（請加 ?reportApi=... 或 localStorage.reportApiUrl）");
      }

      const res = await fetch(reportApiUrl, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`報告 API 錯誤：HTTP ${res.status}`);
      }

      const contentType = (res.headers.get("content-type") || "").toLowerCase();
      if (contentType.includes("application/json")) {
        const json = await res.json();
        const markdown = extractMarkdownFromPayload(json);

        if (typeof markdown !== "string" || !markdown.trim()) {
          throw new Error("報告 API JSON 解析不到文字內容");
        }
        return markdown;
      }

      const text = await res.text();
      if (!text.trim()) {
        throw new Error("報告 API 回傳空內容");
      }
      return text;
    }

    // 從 Markdown 內文抓取自動填表時間（若有）
    function extractReportUpdatedAt(markdown) {
      if (typeof markdown !== "string") return "";
      const match = markdown.match(/自動填表時間：([^）\)\n]+)/);
      return match && match[1] ? match[1].trim() : "";
    }

    // 顯示報告更新時間
    function updateReportUpdatedAt(markdown) {
      const el = document.getElementById("contentUpdatedAt");
      const fromMarkdown = extractReportUpdatedAt(markdown);
      if (fromMarkdown) {
        el.textContent = `報告更新時間：${fromMarkdown}`;
      } else {
        el.textContent = `報告更新時間：${formatDateTime(new Date())}`;
      }
    }

    // 優先渲染 Gemini 最新報告，失敗才回退到預設文字
    async function renderLatestReport() {
      const reportEl = document.getElementById("report");
      try {
        const latestMarkdown = await fetchLatestReportMarkdown();
        reportEl.innerHTML = marked.parse(normalizeMarkdown(latestMarkdown));
        updateReportUpdatedAt(latestMarkdown);
      } catch (error) {
        reportEl.innerHTML = marked.parse(normalizeMarkdown(defaultMarkdownText));
        updateReportUpdatedAt(defaultMarkdownText);
        console.warn(`使用預設報告：${error.message}`);
      }
    }

    // 讀取 JSON：先直連，失敗再嘗試代理（CORS 備援）
    async function fetchJsonWithFallback(primaryUrl) {
      const candidates = [
        // 直連 TWSE
        { label: "direct", url: primaryUrl },
        // 代理 1
        { label: "allorigins", url: `https://api.allorigins.win/raw?url=${encodeURIComponent(primaryUrl)}` },
        // 代理 2
        { label: "corsproxy", url: `https://corsproxy.io/?${encodeURIComponent(primaryUrl)}` }
      ];

      let lastError = "";
      for (const candidate of candidates) {
        try {
          // 禁用快取，確保每次拿到最新資料
          const res = await fetch(candidate.url, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const json = await res.json();
          // 回傳資料與來源路徑（方便除錯）
          return { json, source: candidate.label };
        } catch (err) {
          // 紀錄最後一個失敗原因
          lastError = `${candidate.label}: ${err.message}`;
        }
      }

      throw new Error(`所有來源都失敗 (${lastError})`);
    }

    // 取得當日全市場資料
    async function fetchStockDayAll() {
      const result = await fetchJsonWithFallback("https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL");
      if (!Array.isArray(result.json) || !result.json.length) {
        throw new Error("STOCK_DAY_ALL 回傳格式異常");
      }
      return result;
    }

    // 取得單一股票近 5 日日資料
    async function fetchStockHistory(code) {
      const now = new Date();
      // date 參數用當月 01 日即可（TWSE 會回整月資料）
      const dateParam = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, "0")}01`;
      const url = `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${dateParam}&stockNo=${code}`;
      const result = await fetchJsonWithFallback(url);
      const json = result.json;
      if (json.stat !== "OK" || !Array.isArray(json.data) || !json.data.length) {
        throw new Error(`No history for ${code}`);
      }
      return {
        source: result.source,
        // 只保留近 5 筆，並挑出圖表需要欄位
        data: json.data.slice(-5).map((row) => ({
          date: String(row[0]).replace(/^\d+\//, ""),
          close: parseNumber(row[6]),
          change: parseNumber(row[7]),
          volume: parseNumber(row[1]),
          tradeValue: parseNumber(row[2])
        }))
      };
    }

    // 驗證歷史資料是否可繪圖
    function ensureHistoryRows(historyRows, code) {
      if (!Array.isArray(historyRows) || historyRows.length < 3) {
        throw new Error(`${code} 歷史資料不足`);
      }
      if (historyRows.some((x) => !Number.isFinite(x.close))) {
        throw new Error(`${code} 歷史收盤價格式錯誤`);
      }
      return historyRows;
    }

    // 組裝單一股票快照（當日 + 歷史）
    function buildStockSnapshot(stock, daily, historyRows) {
      const close = parseNumber(daily.ClosingPrice);
      const change = parseNumber(daily.Change);
      const prevClose = close - change;
      const changePct = prevClose ? (change / prevClose) * 100 : 0;

      if (!Number.isFinite(close) || !Number.isFinite(change)) {
        throw new Error(`${stock.code} 當日價格格式錯誤`);
      }

      return {
        ...stock,
        close,
        change,
        changePct,
        // 成交金額用於資金占比圖
        tradeValue: parseNumber(daily.TradeValue),
        history: ensureHistoryRows(historyRows, stock.code)
      };
    }

    // 在頁面上顯示目前資料來源路徑
    function updateSourceNote(daySource, historySources) {
      const uniq = Array.from(new Set([daySource, ...historySources]));
      const sourceText = uniq.join(" + ");
      document.getElementById("sourceNote").textContent = `資料來源：TWSE 開放資料 API（來源路徑：${sourceText}）。`;
    }

    // 顯示每檔股票目前價格（收盤）
    function renderPriceBoard(stocks) {
      const tbody = document.querySelector("#priceTable tbody");
      tbody.innerHTML = "";

      for (const s of stocks) {
        const cls = s.change > 0 ? "up" : (s.change < 0 ? "down" : "flat");
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${s.name}</td>
          <td class="num">${s.code}</td>
          <td class="num">${s.close.toFixed(2)}</td>
          <td class="num ${cls}">${s.change >= 0 ? "+" : ""}${s.change.toFixed(2)}</td>
          <td class="num ${cls}">${formatPct(s.changePct)}</td>
          <td class="num">${(s.tradeValue / 1e8).toFixed(2)}</td>
        `;
        tbody.appendChild(tr);
      }
    }

    // 更新狀態文字（例如：載入中）
    function loadingMessage(text) {
      const statusEl = document.getElementById("fetchStatus");
      statusEl.className = "status";
      statusEl.textContent = text;
    }

    // 建立三張圖表
    function createCharts(stocks, labels) {
      const palette = ["#0d9488", "#f59e0b", "#0ea5e9", "#a855f7"];
      // 趨勢折線圖資料集
      const trendDatasets = stocks.map((s, idx) => ({
        label: `${s.code} ${s.name}`,
        data: s.history.map((d) => d.close),
        borderColor: palette[idx % palette.length],
        backgroundColor: "transparent",
        tension: 0.35,
        pointRadius: 2.5
      }));

      trendChart = new Chart(document.getElementById("trendChart"), {
        type: "line",
        data: { labels, datasets: trendDatasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: "bottom" } },
          scales: {
            y: { grid: { color: "#e2e8f0" } },
            x: { grid: { display: false } }
          }
        }
      });

      const technical = clamp(50 + stocks.reduce((acc, s) => {
        const closes = s.history.map((h) => h.close);
        const ma5 = closes.reduce((a, b) => a + b, 0) / closes.length;
        // 以現價偏離五日均線估計技術強度
        return acc + ((s.close - ma5) / ma5) * 400;
      }, 0) / stocks.length, 5, 95);

      // 動能：用今日漲跌幅平均估算
      const momentum = clamp(50 + stocks.reduce((acc, s) => acc + s.changePct * 4, 0) / stocks.length, 5, 95);
      // 量能：以成交金額粗略映射到 0-100
      const liquidity = clamp(30 + stocks.reduce((acc, s) => acc + (s.tradeValue / 1e8), 0) / stocks.length, 5, 95);
      // 上漲家數占比
      const winRate = clamp((stocks.filter((s) => s.change > 0).length / stocks.length) * 100, 5, 95);

      const avg = stocks.reduce((a, s) => a + s.changePct, 0) / stocks.length;
      const variance = stocks.reduce((a, s) => a + Math.pow(s.changePct - avg, 2), 0) / stocks.length;
      // 波動越大，控制分數越低
      const volatilityControl = clamp(95 - Math.sqrt(variance) * 14, 5, 95);

      // 雷達圖
      radarChart = new Chart(document.getElementById("radarChart"), {
        type: "radar",
        data: {
          labels: ["技術面", "動能", "量能", "上漲家數", "波動可控"],
          datasets: [{
            label: "今日評分",
            data: [technical, momentum, liquidity, winRate, volatilityControl],
            backgroundColor: "rgba(14,116,144,0.22)",
            borderColor: "#0e7490",
            pointBackgroundColor: "#0e7490"
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            r: {
              suggestedMin: 0,
              suggestedMax: 100,
              angleLines: { color: "#cbd5e1" },
              grid: { color: "#e2e8f0" },
              pointLabels: { color: "#0f172a" }
            }
          }
        }
      });

      mixChart = new Chart(document.getElementById("mixChart"), {
        type: "doughnut",
        data: {
          labels: stocks.map((s) => `${s.code} ${s.name}`),
          datasets: [{
            data: stocks.map((s) => s.tradeValue),
            backgroundColor: ["#0d9488", "#0ea5e9", "#f59e0b", "#94a3b8"],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: "68%",
          plugins: { legend: { position: "bottom" } }
        }
      });
    }

    // 更新上方 KPI 卡片
    function renderKpis(stocks) {
      const avgMove = stocks.reduce((acc, s) => acc + s.changePct, 0) / stocks.length;
      const leader = [...stocks].sort((a, b) => b.changePct - a.changePct)[0];
      const volatility = Math.sqrt(stocks.reduce((acc, s) => acc + Math.pow(s.changePct - avgMove, 2), 0) / stocks.length);
      const risk = volatility >= 5 ? "高" : volatility >= 2.5 ? "中" : "低";

      document.getElementById("kpiCount").textContent = String(stocks.length);
      document.getElementById("kpiLeader").textContent = `${leader.code} ${formatPct(leader.changePct)}`;
      document.getElementById("kpiAvgMove").textContent = formatPct(avgMove);
      document.getElementById("kpiRisk").textContent = risk;
      document.getElementById("metaUpdated").textContent = `最後更新：${formatDateTime(new Date())}`;
    }

    // 主流程：讀資料 -> 組資料 -> 更新卡片與圖表
    async function bootstrapRealData() {
      const statusEl = document.getElementById("fetchStatus");
      try {
        loadingMessage("正在讀取即時行情資料...");
        const dayAllResult = await fetchStockDayAll();
        const dayAll = dayAllResult.json;
        const byCode = new Map(dayAll.map((x) => [x.Code, x]));

        const historyResults = await Promise.all(trackedStocks.map((s) => fetchStockHistory(s.code)));

        const stocks = trackedStocks.map((stock, idx) => {
          const daily = byCode.get(stock.code);
          if (!daily) throw new Error(`查無 ${stock.code} 的當日資料`);

          return buildStockSnapshot(stock, daily, historyResults[idx].data);
        });

        const labels = stocks[0].history.map((x) => x.date);
        // 先更新 KPI，再建圖
        renderKpis(stocks);
        renderPriceBoard(stocks);
        createCharts(stocks, labels);
        updateSourceNote(dayAllResult.source, historyResults.map((x) => x.source));

        statusEl.className = "status ok";
        statusEl.textContent = "已載入 TWSE 真實資料，圖表與指標均為即時抓取結果。";
      } catch (error) {
        statusEl.className = "status warn";
        statusEl.textContent = `讀取真實資料失敗：${error.message}。請確認網路或 API 可用性。`;
        document.getElementById("metaUpdated").textContent = "最後更新：資料讀取失敗";
      }
    }

    // 將報告文字自動轉為分段標題，提升可讀性
    function normalizeMarkdown(raw) {
      let text = raw;

      // Add explicit section headings for better visual grouping.
      text = text
        .replace(/\n📋\s*今日偏好摘要\n/g, "\n## 📋 今日偏好摘要\n")
        .replace(/\n📊\s*區塊 A：/g, "\n## 📊 區塊 A：")
        .replace(/\n🚀\s*區塊 B：/g, "\n## 🚀 區塊 B：")
        .replace(/\n✉️\s*每日投資分析短文/g, "\n## ✉️ 每日投資分析短文")
        .replace(/\n【一鍵白話版】/g, "\n## 【一鍵白話版】")
        .replace(/\n【免責聲明】/g, "\n## 【免責聲明】");

      // Convert common label lines into bullet points under each section.
      text = text.replace(/\n(策略核心：|追蹤個股：|核心指標：|順序調整：|新聞呈現：|風控機制：)/g, "\n- $1");

      // Improve sub-section readability for numbered stocks and report blocks.
      text = text.replace(/\n(\d+\.\s[^\n]+)/g, "\n### $1");
      text = text.replace(/\n(●\s[^\n]+)/g, "\n### $1");

      // Ensure enough blank lines between dense chunks.
      text = text.replace(/\n{3,}/g, "\n\n");

      return text;
    }

    // 啟動：同時更新文字報告與真實行情資料
    renderLatestReport();
    bootstrapRealData();
  </script>
</body>
</html>
